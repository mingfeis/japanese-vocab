<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J-Flash Pro V5.9 Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background: #0f172a; color: #f1f5f9; touch-action: manipulation; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; height: 600px; }
        .flipped { transform: rotateY(180deg); }
        .front, .back { backface-visibility: hidden; position: absolute; inset: 0; border-radius: 2.5rem; overflow: hidden; }
        .back { transform: rotateY(180deg); background: #ffffff; color: #1e293b; }
        .front { background: #ffffff; color: #1e293b; cursor: pointer; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="init-overlay" class="fixed inset-0 z-50 bg-indigo-600 flex flex-col items-center justify-center text-white p-6 text-center">
        <h1 class="text-3xl font-black mb-4 tracking-tighter">J-FLASH V5.9</h1>
        <p class="mb-8 opacity-70">UI 优化、统一颜色 & 优质声音回归</p>
        <button id="start-btn" class="bg-white text-indigo-600 px-16 py-4 rounded-full font-black shadow-2xl active:scale-95 transition-all">解锁并进入学习</button>
    </div>

    <div class="w-full max-w-md glass-panel p-4 rounded-3xl mb-4 flex items-center justify-between">
        <div class="flex flex-col">
            <span id="progress-text" class="text-[10px] font-black text-indigo-300 uppercase">PROGRESS: 0/0</span>
            <div class="w-24 bg-white/10 h-1 rounded-full mt-1"><div id="progress-bar" class="bg-indigo-400 h-full w-0 transition-all"></div></div>
        </div>
        <button onclick="document.getElementById('csv-input').click()" class="bg-indigo-500 text-white text-xs px-5 py-2 rounded-xl font-black">导入词库</button>
        <input type="file" id="csv-input" accept=".csv" class="hidden">
    </div>

    <div id="main-container" class="w-full max-w-md hidden">
        <div class="relative w-full" style="height: 600px;">
            <div id="card-inner" class="flip-card-inner relative w-full">
                <div class="front shadow-2xl flex flex-col" onclick="flipToBack()">
                    <div class="h-[45%] bg-slate-900 relative">
                        <img id="card-image" class="w-full h-full object-cover opacity-0 transition-opacity duration-700" src="">
                    </div>
                    <div class="flex-1 flex flex-col items-center justify-center p-6 bg-white text-center">
                        <div id="word-front" class="text-6xl font-black text-slate-800 mb-8 tracking-tighter">...</div>
                        <button onclick="speakCurrent(event)" class="w-20 h-20 rounded-full bg-slate-50 text-indigo-500 flex items-center justify-center shadow-inner hover:bg-indigo-100 transition-colors">
                            <i class="fas fa-volume-up text-3xl"></i>
                        </button>
                    </div>
                </div>
                <div class="back shadow-2xl flex flex-col p-6 overflow-hidden">
                    <div id="back-content" class="flex-1 overflow-y-auto no-scrollbar" onclick="flipToFront()"></div>
                    <div class="grid grid-cols-4 gap-2 mt-4 pt-4 border-t border-slate-100">
                        <button onclick="handleSRS('again', event)" class="py-4 bg-rose-50 text-rose-500 rounded-2xl text-[10px] font-black uppercase">Again</button>
                        <button onclick="handleSRS('hard', event)" class="py-4 bg-amber-50 text-amber-600 rounded-2xl text-[10px] font-black uppercase">Hard</button>
                        <button onclick="handleSRS('good', event)" class="py-4 bg-emerald-50 text-emerald-600 rounded-2xl text-[10px] font-black uppercase">Good</button>
                        <button onclick="handleSRS('easy', event)" class="py-4 bg-sky-50 text-sky-600 rounded-2xl text-[10px] font-black uppercase">Easy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let activeQueue = [];
        let totalCount = 0;
        let selectedVoice = null;

        function findBestVoice() {
            const vs = window.speechSynthesis.getVoices();
            // 优先寻找 Google 日本语或优质女声
            selectedVoice = vs.find(v => v.lang.includes('ja') && (v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('Nanami'))) || 
                            vs.find(v => v.lang.includes('ja')) || vs[0];
        }
        window.speechSynthesis.onvoiceschanged = findBestVoice;

        document.getElementById('start-btn').addEventListener('click', function() {
            findBestVoice();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
            document.getElementById('init-overlay').classList.add('hidden');
            document.getElementById('main-container').classList.remove('hidden');
            const saved = localStorage.getItem('jflash_v5_9');
            if (saved) {
                const d = JSON.parse(saved); activeQueue = d.activeQueue; totalCount = d.totalCount;
                if (activeQueue.length > 0) renderCard();
            }
        });

        function parseCSV(text) {
            const rows = [];
            let currentField = '', inQuotes = false;
            let currentRow = [];
            const cleanText = text.trim();

            for (let i = 0; i < cleanText.length; i++) {
                const char = cleanText[i];
                if (inQuotes) {
                    if (char === '"' && cleanText[i+1] === '"') { currentField += '"'; i++; }
                    else if (char === '"') inQuotes = false;
                    else currentField += char;
                } else {
                    if (char === '"') inQuotes = true;
                    else if (char === ',') { currentRow.push(currentField); currentField = ''; }
                    else if (char === '\n' || char === '\r') {
                        if (currentField || currentRow.length > 0) {
                            currentRow.push(currentField); rows.push(currentRow);
                            currentRow = []; currentField = '';
                        }
                    } else currentField += char;
                }
            }
            if (currentField || currentRow.length > 0) { currentRow.push(currentField); rows.push(currentRow); }

            return rows.filter(r => r[0] && r[0].includes('第')).map(row => {
                const word = row[1] ? row[1].trim() : "";
                const detail = row[2] ? row[2].trim() : "";
                const lines = detail.split('\n').map(l => l.trim()).filter(l => l);
                
                // 提取逻辑：寻找包含关键词的行
                const collocationLine = lines.find(l => l.includes('搭配词') || l.includes('搭配詞')) || "";
                const inflectionLine = lines.find(l => l.includes('變化') || l.includes('变化') || l.includes('詞性')) || "";
                
                // 释义逻辑：取第二行，或者不带特殊符号的第一行
                const meaningLine = lines.find(l => !l.includes('[') && !l.includes('【') && !/^\d+\./.test(l)) || "";
                const examples = lines.filter(l => /^\d+\./.test(l));

                return {
                    kanji: word,
                    yomi: lines.find(l => l.includes('[') && !l.includes('【')) || word,
                    collocation: collocationLine,
                    inflection: inflectionLine,
                    meaning: meaningLine,
                    examples: examples
                };
            }).filter(item => item.kanji);
        }

        document.getElementById('csv-input').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const results = parseCSV(ev.target.result);
                if (results.length > 0) {
                    activeQueue = results; totalCount = results.length;
                    saveProgress(); renderCard();
                }
            };
            reader.readAsText(e.target.files[0]);
        });

        function renderCard() {
            if (activeQueue.length === 0) return;
            const current = activeQueue[0];
            document.getElementById('card-inner').classList.remove('flipped');
            document.getElementById('word-front').innerText = current.kanji;
            
            const img = document.getElementById('card-image');
            img.style.opacity = '0';
            img.src = `https://loremflickr.com/800/600/japan,zen?lock=${Math.random()}`;
            img.onload = () => img.style.opacity = '1';

            // 统一使用 Indigo 浅色调作为“搭配”和“词性”的背景，避免黑色块视觉疲劳
            let extraHTML = '';
            if (current.collocation) {
                extraHTML += `<div class="mb-2 p-3 bg-indigo-50 border border-indigo-100 rounded-xl text-[13px] text-indigo-900 font-bold"><i class="fas fa-link mr-2 opacity-50"></i>${current.collocation}</div>`;
            }
            if (current.inflection) {
                extraHTML += `<div class="mb-3 p-3 bg-indigo-50 border border-indigo-100 rounded-xl text-[13px] text-indigo-900 font-bold"><i class="fas fa-layer-group mr-2 opacity-50"></i>${current.inflection}</div>`;
            }

            let exHTML = '';
            current.examples.forEach(ex => {
                exHTML += `<div class="p-4 bg-slate-50 rounded-2xl mb-2 flex justify-between items-center border border-slate-100">
                    <p class="text-[13px] text-slate-700 leading-relaxed flex-1">${ex}</p>
                    <button class="ml-3 text-indigo-500 bg-white w-10 h-10 rounded-full shadow-sm flex-shrink-0 flex items-center justify-center" onclick="event.stopPropagation(); speak('${ex}')">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>`;
            });

            document.getElementById('back-content').innerHTML = `
                <div class="mb-6">
                    <div class="flex items-center gap-3">
                        <h2 class="text-4xl font-black text-slate-800 tracking-tighter">${current.kanji}</h2>
                        <button class="text-indigo-500 bg-indigo-50 p-3 rounded-full" onclick="event.stopPropagation(); speak('${current.kanji}')"><i class="fas fa-volume-up text-xl"></i></button>
                    </div>
                    <p class="text-indigo-600 font-bold text-xl mt-1">${current.yomi}</p>
                </div>
                ${extraHTML}
                <div class="mb-6 p-4 bg-white border border-slate-100 rounded-2xl text-[14px] text-slate-600 font-medium leading-relaxed italic">
                    ${current.meaning}
                </div>
                <div class="space-y-1">
                    <span class="text-[10px] font-black text-slate-400 block mb-2 tracking-widest uppercase">Example Sentences</span>
                    ${exHTML || '<p class="text-slate-300 italic text-center text-sm">No examples</p>'}
                </div>
            `;
            updateUI();
            setTimeout(() => speak(current.kanji), 600);
        }

        function speak(t) {
            if (!t) return;
            window.speechSynthesis.cancel();
            
            // 过滤例句前的数字和括号中的中文
            let cleanText = t.replace(/^\d+\.\s*/, '')
                             .replace(/\（.*?\）|\(.*?\)|（.*?）/g, '')
                             .replace(/【.*?】/g, '');
            
            const u = new SpeechSynthesisUtterance(cleanText);
            if (selectedVoice) u.voice = selectedVoice;
            u.lang = 'ja-JP';
            u.rate = 0.92;
            window.speechSynthesis.speak(u);
        }

        function speakCurrent(e) { e.stopPropagation(); speak(activeQueue[0].kanji); }
        function handleSRS(type, e) {
            e.stopPropagation();
            const c = activeQueue.shift();
            if (type === 'again') activeQueue.splice(1, 0, c);
            else if (type === 'hard') activeQueue.splice(Math.min(activeQueue.length, 5), 0, c);
            else if (type === 'good') activeQueue.push(c);
            saveProgress(); renderCard();
        }

        function flipToBack() { document.getElementById('card-inner').classList.add('flipped'); }
        function flipToFront() { document.getElementById('card-inner').classList.remove('flipped'); }
        function saveProgress() { localStorage.setItem('jflash_v5_9', JSON.stringify({ activeQueue, totalCount })); }
        function updateUI() {
            const prog = totalCount > 0 ? ((totalCount - activeQueue.length) / totalCount) * 100 : 0;
            document.getElementById('progress-bar').style.width = prog + '%';
            document.getElementById('progress-text').innerText = `Progress: ${totalCount - activeQueue.length} / ${totalCount}`;
        }
    </script>
</body>
</html>
