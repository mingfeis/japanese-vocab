<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J-Flash Pro V5.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background: #0f172a; color: #f1f5f9; touch-action: manipulation; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; height: 500px; }
        .flipped { transform: rotateY(180deg); }
        .front, .back { backface-visibility: hidden; position: absolute; inset: 0; border-radius: 2rem; overflow: hidden; }
        .back { transform: rotateY(180deg); background: #ffffff; color: #1e293b; }
        .front { background: #ffffff; color: #1e293b; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="init-overlay" class="fixed inset-0 z-50 bg-indigo-600 flex flex-col items-center justify-center text-white p-6 text-center">
        <h1 class="text-2xl font-black mb-8">J-Flash Pro V5.1</h1>
        <p class="mb-6 opacity-80 text-sm">点击按钮以激活语音引擎并开始</p>
        <button id="start-btn" class="bg-white text-indigo-600 px-12 py-4 rounded-full font-black shadow-2xl active:scale-95 transition-all">解锁并开始</button>
    </div>

    <div class="w-full max-w-md glass-panel p-4 rounded-3xl mb-4 flex items-center justify-between">
        <div class="flex flex-col">
            <span id="progress-text" class="text-[10px] font-bold text-indigo-300">进度: 0/0</span>
            <div class="w-24 bg-white/10 h-1 rounded-full mt-1"><div id="progress-bar" class="bg-indigo-500 h-full w-0 transition-all"></div></div>
        </div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('csv-input').click()" class="bg-indigo-500 text-white text-[10px] px-3 py-2 rounded-lg font-bold">导入CSV</button>
            <button onclick="showPasteArea()" class="bg-slate-700 text-white text-[10px] px-3 py-2 rounded-lg font-bold">手动粘贴</button>
            <input type="file" id="csv-input" accept=".csv" class="hidden">
        </div>
    </div>

    <div id="paste-area" class="fixed inset-0 z-40 bg-slate-900/95 p-6 hidden flex flex-col">
        <textarea id="csv-text-input" class="flex-1 bg-slate-800 text-white p-4 rounded-xl mb-4 text-sm" placeholder="粘贴内容..."></textarea>
        <div class="flex gap-4">
            <button onclick="hidePasteArea()" class="flex-1 py-3 bg-slate-600 rounded-xl font-bold">取消</button>
            <button onclick="processPaste()" class="flex-1 py-3 bg-indigo-600 rounded-xl font-bold">导入</button>
        </div>
    </div>

    <div id="main-container" class="w-full max-w-md hidden">
        <div class="relative w-full" style="height: 500px;">
            <div id="card-inner" class="flip-card-inner relative w-full">
                <div class="front shadow-xl flex flex-col" onclick="flipToBack()">
                    <div class="h-1/2 bg-slate-100 relative overflow-hidden">
                        <img id="card-image" class="w-full h-full object-cover opacity-0 transition-opacity" src="">
                    </div>
                    <div class="flex-1 flex flex-col items-center justify-center p-6 bg-white">
                        <div id="word-front" class="text-5xl font-black text-slate-800 mb-6">...</div>
                        <button onclick="speakCurrent(event)" class="w-16 h-16 rounded-full bg-indigo-50 text-indigo-500 flex items-center justify-center shadow-sm">
                            <i class="fas fa-volume-up text-2xl"></i>
                        </button>
                    </div>
                </div>
                <div class="back shadow-xl flex flex-col p-6 overflow-hidden">
                    <div id="back-content" class="flex-1 overflow-y-auto pr-2" onclick="flipToFront()"></div>
                    <div class="grid grid-cols-4 gap-2 mt-4 pt-4 border-t border-slate-100">
                        <button onclick="handleSRS('again', event)" class="py-3 bg-rose-50 text-rose-500 rounded-xl text-[10px] font-black uppercase">Again</button>
                        <button onclick="handleSRS('hard', event)" class="py-3 bg-amber-50 text-amber-600 rounded-xl text-[10px] font-black uppercase">Hard</button>
                        <button onclick="handleSRS('good', event)" class="py-3 bg-emerald-50 text-emerald-600 rounded-xl text-[10px] font-black uppercase">Good</button>
                        <button onclick="handleSRS('easy', event)" class="py-3 bg-sky-50 text-sky-600 rounded-xl text-[10px] font-black uppercase">Easy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let activeQueue = [];
        let totalCount = 0;

        // 强力解锁：解决手机浏览器无反应
        document.getElementById('start-btn').addEventListener('click', function() {
            const silent = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(silent);
            document.getElementById('init-overlay').classList.add('hidden');
            document.getElementById('main-container').classList.remove('hidden');
            
            const saved = localStorage.getItem('jflash_v5_1');
            if (saved) {
                const d = JSON.parse(saved);
                activeQueue = d.activeQueue; totalCount = d.totalCount;
                if (activeQueue.length > 0) renderCard();
            }
        });

        // 修正例句无法显示的问题：加强 CSV 处理
        function parseCSV(text) {
            const items = [];
            // 分割每一块 (以"第x课"开头)
            const blocks = text.split(/第\d+课/g);
            blocks.forEach(block => {
                if (!block.trim()) return;
                
                // 清理多余引号和换行符差异
                const rawLines = block.split(/\r?\n/).map(l => l.trim().replace(/^"|"$/g, '')).filter(l => l);
                if (rawLines.length < 2) return;

                // 提取单词 (处理开头带逗号的情况)
                const firstLineParts = rawLines[0].split(',').filter(p => p.trim());
                const word = firstLineParts[0];

                // 提取例句：寻找所有以数字开头的行
                const examples = rawLines.filter(l => /^\d+\./.test(l));

                if (word) {
                    items.push({
                        kanji: word,
                        yomi: rawLines[1] || word,
                        meaning: rawLines[2] || "详见例句",
                        examples: examples,
                        full: block
                    });
                }
            });
            return items;
        }

        // 文件导入逻辑
        document.getElementById('csv-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const results = parseCSV(ev.target.result);
                if (results.length > 0) {
                    activeQueue = results; totalCount = results.length;
                    saveProgress(); renderCard();
                } else { alert("导入失败，请检查CSV格式"); }
            };
            reader.readAsText(file);
        });

        function showPasteArea() { document.getElementById('paste-area').classList.remove('hidden'); }
        function hidePasteArea() { document.getElementById('paste-area').classList.add('hidden'); }
        function processPaste() {
            const text = document.getElementById('csv-text-input').value;
            const results = parseCSV(text);
            if (results.length > 0) {
                activeQueue = results; totalCount = results.length;
                saveProgress(); renderCard(); hidePasteArea();
            }
        }

        function renderCard() {
            if (activeQueue.length === 0) return;
            const current = activeQueue[0];
            document.getElementById('card-inner').classList.remove('flipped');
            document.getElementById('word-front').innerText = current.kanji;
            
            const img = document.getElementById('card-image');
            img.style.opacity = '0';
            img.src = `https://loremflickr.com/800/600/japan,nature?lock=${Math.random()}`;
            img.onload = () => img.style.opacity = '1';

            let exHTML = '';
            current.examples.forEach(ex => {
                exHTML += `<div class="p-3 bg-slate-50 rounded-xl mb-2 flex justify-between items-center text-sm">
                    <p class="flex-1 text-slate-700 leading-relaxed">${ex}</p>
                    <button class="text-indigo-500 ml-2 p-2" onclick="event.stopPropagation(); speak('${ex.replace(/^\d+\./,'')}')"><i class="fas fa-volume-up"></i></button>
                </div>`;
            });

            document.getElementById('back-content').innerHTML = `
                <div class="mb-4">
                    <div class="flex items-center gap-2">
                        <h2 class="text-3xl font-black">${current.kanji}</h2>
                        <button class="text-indigo-500 p-2" onclick="event.stopPropagation(); speak('${current.kanji}')"><i class="fas fa-volume-up"></i></button>
                    </div>
                    <p class="text-indigo-600 font-bold">${current.yomi}</p>
                </div>
                <div class="mb-4 p-3 bg-indigo-50 rounded-xl text-sm font-medium text-indigo-900 border border-indigo-100">${current.meaning}</div>
                <div class="space-y-1">${exHTML}</div>
            `;
            updateUI();
            setTimeout(() => speak(current.kanji), 600);
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'ja-JP';
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        function speakCurrent(e) { e.stopPropagation(); speak(activeQueue[0].kanji); }
        function handleSRS(type, e) {
            e.stopPropagation();
            const c = activeQueue.shift();
            if (type === 'again') activeQueue.splice(1, 0, c);
            else if (type === 'hard') activeQueue.splice(Math.min(activeQueue.length, 5), 0, c);
            else if (type === 'good') activeQueue.push(c);
            saveProgress(); renderCard();
        }

        function flipToBack() { document.getElementById('card-inner').classList.add('flipped'); }
        function flipToFront() { document.getElementById('card-inner').classList.remove('flipped'); }
        function saveProgress() { localStorage.setItem('jflash_v5_1', JSON.stringify({ activeQueue, totalCount })); }
        function updateUI() {
            const prog = totalCount > 0 ? ((totalCount - activeQueue.length) / totalCount) * 100 : 0;
            document.getElementById('progress-bar').style.width = prog + '%';
            document.getElementById('progress-text').innerText = `进度: ${totalCount - activeQueue.length} / ${totalCount}`;
        }
    </script>
</body>
</html>
