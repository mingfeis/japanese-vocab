<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J-Flash Pro V5.3 Desktop Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background: #0f172a; color: #f1f5f9; touch-action: manipulation; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; height: 550px; }
        .flipped { transform: rotateY(180deg); }
        .front, .back { backface-visibility: hidden; position: absolute; inset: 0; border-radius: 2.5rem; overflow: hidden; }
        .back { transform: rotateY(180deg); background: #ffffff; color: #1e293b; }
        .front { background: #ffffff; color: #1e293b; cursor: pointer; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="init-overlay" class="fixed inset-0 z-50 bg-indigo-600 flex flex-col items-center justify-center text-white p-6 text-center">
        <h1 class="text-3xl font-black mb-4 tracking-tighter">J-FLASH V5.3</h1>
        <p class="mb-8 opacity-70">高清语音引擎已就绪</p>
        <button id="start-btn" class="bg-white text-indigo-600 px-16 py-4 rounded-full font-black shadow-2xl active:scale-95 transition-all">进入学习</button>
    </div>

    <div class="w-full max-w-md glass-panel p-4 rounded-3xl mb-4 flex items-center justify-between">
        <div class="flex flex-col">
            <span id="progress-text" class="text-[10px] font-black text-indigo-300 uppercase">Progress: 0/0</span>
            <div class="w-24 bg-white/10 h-1 rounded-full mt-1"><div id="progress-bar" class="bg-indigo-400 h-full w-0"></div></div>
        </div>
        <button onclick="document.getElementById('csv-input').click()" class="bg-indigo-500 text-white text-xs px-5 py-2 rounded-xl font-black shadow-lg">导入新词库</button>
        <input type="file" id="csv-input" accept=".csv" class="hidden">
    </div>

    <div id="main-container" class="w-full max-w-md hidden">
        <div class="relative w-full" style="height: 550px;">
            <div id="card-inner" class="flip-card-inner relative w-full">
                <div class="front shadow-2xl flex flex-col" onclick="flipToBack()">
                    <div class="h-1/2 bg-slate-900 relative">
                        <img id="card-image" class="w-full h-full object-cover opacity-0 transition-opacity duration-700" src="">
                    </div>
                    <div class="flex-1 flex flex-col items-center justify-center p-6 bg-white">
                        <div id="word-front" class="text-6xl font-black text-slate-800 mb-8 tracking-tighter">...</div>
                        <button onclick="speakCurrent(event)" class="w-20 h-20 rounded-full bg-slate-50 text-indigo-500 flex items-center justify-center shadow-inner hover:bg-indigo-100 transition-all">
                            <i class="fas fa-volume-up text-3xl"></i>
                        </button>
                    </div>
                </div>
                <div class="back shadow-2xl flex flex-col p-6 overflow-hidden">
                    <div id="back-content" class="flex-1 overflow-y-auto no-scrollbar" onclick="flipToFront()"></div>
                    <div class="grid grid-cols-4 gap-2 mt-4 pt-4 border-t border-slate-100">
                        <button onclick="handleSRS('again', event)" class="py-4 bg-rose-50 text-rose-500 rounded-2xl text-[10px] font-black">AGAIN</button>
                        <button onclick="handleSRS('hard', event)" class="py-4 bg-amber-50 text-amber-600 rounded-2xl text-[10px] font-black">HARD</button>
                        <button onclick="handleSRS('good', event)" class="py-4 bg-emerald-50 text-emerald-600 rounded-2xl text-[10px] font-black">GOOD</button>
                        <button onclick="handleSRS('easy', event)" class="py-4 bg-sky-50 text-sky-600 rounded-2xl text-[10px] font-black">EASY</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let activeQueue = [];
        let totalCount = 0;
        let selectedVoice = null;

        // 语音引擎强制筛选逻辑
        function updateVoice() {
            const voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) return;
            // 桌面端首选优质 Google 或 Microsoft 自然音包
            selectedVoice = voices.find(v => v.lang.includes('ja') && v.name.includes('Google')) ||
                            voices.find(v => v.lang.includes('ja') && v.name.includes('Microsoft')) ||
                            voices.find(v => v.lang.includes('ja') && v.name.includes('Siri')) ||
                            voices.find(v => v.lang.includes('ja'));
            console.log("Using voice:", selectedVoice ? selectedVoice.name : "Default");
        }
        window.speechSynthesis.onvoiceschanged = updateVoice;
        
        document.getElementById('start-btn').addEventListener('click', function() {
            updateVoice();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance('')); // 激活音频上下文
            document.getElementById('init-overlay').classList.add('hidden');
            document.getElementById('main-container').classList.remove('hidden');
            const saved = localStorage.getItem('jflash_v5_3');
            if (saved) {
                const d = JSON.parse(saved);
                activeQueue = d.activeQueue; totalCount = d.totalCount;
                if (activeQueue.length > 0) renderCard();
            }
        });

        // 终极 CSV 解析逻辑：能够提取引号内的【搭配词】
        function parseCSV(text) {
            const items = [];
            // 使用状态机思想处理 CSV 引号和换行
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (inQuotes) {
                    if (char === '"' && text[i+1] === '"') { currentField += '"'; i++; } // 处理双引号转义
                    else if (char === '"') { inQuotes = false; }
                    else { currentField += char; }
                } else {
                    if (char === '"') { inQuotes = true; }
                    else if (char === ',') { currentRow.push(currentField); currentField = ''; }
                    else if (char === '\n' || char === '\r') {
                        if (currentField || currentRow.length > 0) {
                            currentRow.push(currentField);
                            rows.push(currentRow);
                            currentRow = [];
                            currentField = '';
                        }
                    } else { currentField += char; }
                }
            }

            rows.forEach(row => {
                // 寻找包含“第x课”的行，通常 row[0]=课次, row[1]=单词, row[2]=详细内容
                if (row[0] && row[0].includes('第') && row[0].includes('课')) {
                    const word = row[1] ? row[1].trim() : "";
                    const rawDetail = row[2] ? row[2].trim() : "";
                    if (!word || !rawDetail) return;

                    const lines = rawDetail.split('\n').map(l => l.trim()).filter(l => l);
                    
                    // 提取所有关键信息
                    const yomi = lines.find(l => l.includes('[') && !l.includes('【')) || word;
                    const collocation = lines.find(l => l.includes('【搭配词】')) || "";
                    const meaning = lines[1] && !lines[1].includes('[') && !lines[1].includes('【') ? lines[1] : (lines[2] || "");
                    const examples = lines.filter(l => /^\d+\./.test(l));

                    items.push({
                        kanji: word, yomi: yomi, collocation: collocation,
                        meaning: meaning, examples: examples
                    });
                }
            });
            return items;
        }

        document.getElementById('csv-input').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const results = parseCSV(ev.target.result);
                if (results.length > 0) {
                    activeQueue = results; totalCount = results.length;
                    saveProgress(); renderCard();
                } else { alert("解析失败，请确保CSV符合《新编》格式"); }
            };
            reader.readAsText(e.target.files[0]);
        });

        function renderCard() {
            if (activeQueue.length === 0) return;
            const current = activeQueue[0];
            document.getElementById('card-inner').classList.remove('flipped');
            document.getElementById('word-front').innerText = current.kanji;
            
            const img = document.getElementById('card-image');
            img.style.opacity = '0';
            img.src = `https://loremflickr.com/800/600/japan,architecture?lock=${Math.floor(Math.random()*1000)}`;
            img.onload = () => img.style.opacity = '1';

            // 背面：确保搭配词显示
            let collHTML = current.collocation ? 
                `<div class="mb-4 p-4 bg-orange-50 border border-orange-100 rounded-2xl">
                    <span class="text-[10px] font-black text-orange-400 block mb-1 tracking-widest uppercase">Collocation</span>
                    <p class="text-sm text-orange-900 font-bold">${current.collocation}</p>
                </div>` : '';

            let exHTML = '';
            current.examples.forEach(ex => {
                exHTML += `<div class="p-4 bg-slate-50 rounded-2xl mb-2 flex justify-between items-center border border-slate-100">
                    <p class="text-sm text-slate-700 leading-relaxed flex-1">${ex}</p>
                    <button class="ml-3 text-indigo-500 bg-white w-10 h-10 rounded-full shadow-sm flex-shrink-0" onclick="event.stopPropagation(); speak('${ex.replace(/^\d+\./,'')}')"><i class="fas fa-volume-up"></i></button>
                </div>`;
            });

            document.getElementById('back-content').innerHTML = `
                <div class="mb-6">
                    <div class="flex items-center gap-3">
                        <h2 class="text-4xl font-black text-slate-800 tracking-tighter">${current.kanji}</h2>
                        <button class="text-indigo-500 bg-indigo-50 p-3 rounded-full" onclick="event.stopPropagation(); speak('${current.kanji}')"><i class="fas fa-volume-up text-xl"></i></button>
                    </div>
                    <p class="text-indigo-600 font-bold text-xl mt-1">${current.yomi}</p>
                </div>
                ${collHTML}
                <div class="mb-6 p-5 bg-indigo-50/50 rounded-3xl border border-indigo-100/50">
                    <p class="text-slate-800 font-medium">${current.meaning}</p>
                </div>
                <div class="space-y-2">
                    <span class="text-[10px] font-black text-slate-400 block mb-2 tracking-widest uppercase">Example Sentences</span>
                    ${exHTML || '<p class="text-slate-300 italic text-center">暂无例句</p>'}
                </div>
            `;
            updateUI();
            setTimeout(() => speak(current.kanji), 700);
        }

        function speak(t) {
            if (!t) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            if (selectedVoice) u.voice = selectedVoice;
            u.lang = 'ja-JP';
            u.rate = 0.85; 
            u.pitch = 1.05; 
            u.volume = 1.0;
            window.speechSynthesis.speak(u);
        }

        function speakCurrent(e) { e.stopPropagation(); speak(activeQueue[0].kanji); }
        function handleSRS(type, e) {
            e.stopPropagation();
            const c = activeQueue.shift();
            if (type === 'again') activeQueue.splice(1, 0, c);
            else if (type === 'hard') activeQueue.splice(Math.min(activeQueue.length, 5), 0, c);
            else if (type === 'good') activeQueue.push(c);
            saveProgress(); renderCard();
        }

        function flipToBack() { document.getElementById('card-inner').classList.add('flipped'); }
        function flipToFront() { document.getElementById('card-inner').classList.remove('flipped'); }
        function saveProgress() { localStorage.setItem('jflash_v5_3', JSON.stringify({ activeQueue, totalCount })); }
        function updateUI() {
            const prog = totalCount > 0 ? ((totalCount - activeQueue.length) / totalCount) * 100 : 0;
            document.getElementById('progress-bar').style.width = prog + '%';
            document.getElementById('progress-text').innerText = `Progress: ${totalCount - activeQueue.length} / ${totalCount}`;
        }
    </script>
</body>
</html>
