<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J-Flash Pro V5.2 Premium Voice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background: #0f172a; color: #f1f5f9; touch-action: manipulation; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; height: 520px; }
        .flipped { transform: rotateY(180deg); }
        .front, .back { backface-visibility: hidden; position: absolute; inset: 0; border-radius: 2rem; overflow: hidden; }
        .back { transform: rotateY(180deg); background: #ffffff; color: #1e293b; }
        .front { background: #ffffff; color: #1e293b; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="init-overlay" class="fixed inset-0 z-50 bg-indigo-600 flex flex-col items-center justify-center text-white p-6 text-center">
        <h1 class="text-2xl font-black mb-8 italic">J-FLASH V5.2</h1>
        <button id="start-btn" class="bg-white text-indigo-600 px-14 py-4 rounded-full font-black shadow-2xl active:scale-95 transition-all uppercase tracking-tighter">解锁高清音质 & 开始</button>
    </div>

    <div class="w-full max-w-md glass-panel p-4 rounded-3xl mb-4 flex items-center justify-between">
        <div class="flex flex-col">
            <span id="progress-text" class="text-[10px] font-black text-indigo-300">PROGRESS: 0/0</span>
            <div class="w-24 bg-white/10 h-1 rounded-full mt-1"><div id="progress-bar" class="bg-indigo-400 h-full w-0 transition-all"></div></div>
        </div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('csv-input').click()" class="bg-indigo-500 text-white text-[10px] px-4 py-2 rounded-xl font-bold">导入CSV</button>
            <input type="file" id="csv-input" accept=".csv" class="hidden">
        </div>
    </div>

    <div id="main-container" class="w-full max-w-md hidden">
        <div class="relative w-full" style="height: 520px;">
            <div id="card-inner" class="flip-card-inner relative w-full">
                <div class="front shadow-2xl flex flex-col" onclick="flipToBack()">
                    <div class="h-1/2 bg-slate-900 relative overflow-hidden">
                        <img id="card-image" class="w-full h-full object-cover opacity-0 transition-opacity duration-1000" src="">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
                    </div>
                    <div class="flex-1 flex flex-col items-center justify-center p-6 bg-white">
                        <div id="word-front" class="text-5xl font-black text-slate-800 mb-8 tracking-tighter">...</div>
                        <button onclick="speakCurrent(event)" class="w-20 h-20 rounded-full bg-indigo-50 text-indigo-500 flex items-center justify-center shadow-inner hover:bg-indigo-100 transition-colors">
                            <i class="fas fa-volume-up text-3xl"></i>
                        </button>
                    </div>
                </div>
                <div class="back shadow-2xl flex flex-col p-6 overflow-hidden">
                    <div id="back-content" class="flex-1 overflow-y-auto pr-2 no-scrollbar" onclick="flipToFront()"></div>
                    <div class="grid grid-cols-4 gap-2 mt-4 pt-4 border-t border-slate-100">
                        <button onclick="handleSRS('again', event)" class="py-3 bg-rose-50 text-rose-500 rounded-xl text-[10px] font-black">AGAIN</button>
                        <button onclick="handleSRS('hard', event)" class="py-3 bg-amber-50 text-amber-600 rounded-xl text-[10px] font-black">HARD</button>
                        <button onclick="handleSRS('good', event)" class="py-3 bg-emerald-50 text-emerald-600 rounded-xl text-[10px] font-black">GOOD</button>
                        <button onclick="handleSRS('easy', event)" class="py-3 bg-sky-50 text-sky-600 rounded-xl text-[10px] font-black">EASY</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let activeQueue = [];
        let totalCount = 0;
        let bestVoice = null;

        // 语音引擎强制优化
        function findBestVoice() {
            const voices = window.speechSynthesis.getVoices();
            // 优先级排序: Google 日本语 -> 系统内置优质声 (Siri/O-ren) -> 任意日语
            bestVoice = voices.find(v => v.lang.includes('ja') && v.name.includes('Google')) ||
                        voices.find(v => v.lang.includes('ja') && (v.name.includes('Siri') || v.name.includes('O-ren'))) ||
                        voices.find(v => v.lang.includes('ja')) || 
                        voices[0];
            console.log("Selected Voice:", bestVoice ? bestVoice.name : "None");
        }
        window.speechSynthesis.onvoiceschanged = findBestVoice;

        document.getElementById('start-btn').addEventListener('click', function() {
            findBestVoice();
            const silent = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(silent);
            document.getElementById('init-overlay').classList.add('hidden');
            document.getElementById('main-container').classList.remove('hidden');
            const saved = localStorage.getItem('jflash_v5_2');
            if (saved) {
                const d = JSON.parse(saved);
                activeQueue = d.activeQueue; totalCount = d.totalCount;
                if (activeQueue.length > 0) renderCard();
            }
        });

        // 核心解析逻辑：修复单词搭配一栏
        function parseCSV(text) {
            const items = [];
            const blocks = text.split(/第\d+课/g);
            blocks.forEach(block => {
                if (!block.trim()) return;
                const lines = block.split(/\r?\n/).map(l => l.trim().replace(/^"|"$/g, '')).filter(l => l);
                
                const word = lines[0].split(',')[0];
                const yomi = lines.find(l => l.includes('[') && !l.includes('【')) || "";
                // 关键点：提取【搭配词】
                const collocation = lines.find(l => l.includes('【搭配词】')) || "";
                // 提取例句
                const examples = lines.filter(l => /^\d+\./.test(l));
                // 提取简单释义（通常在读音行之后，例句之前）
                const meaning = lines[1] && !lines[1].includes('[') ? lines[1] : (lines[2] || "");

                if (word) {
                    items.push({
                        kanji: word, yomi: yomi, collocation: collocation,
                        meaning: meaning, examples: examples
                    });
                }
            });
            return items;
        }

        document.getElementById('csv-input').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const results = parseCSV(ev.target.result);
                if (results.length > 0) {
                    activeQueue = results; totalCount = results.length;
                    saveProgress(); renderCard();
                }
            };
            reader.readAsText(e.target.files[0]);
        });

        function renderCard() {
            if (activeQueue.length === 0) return;
            const current = activeQueue[0];
            document.getElementById('card-inner').classList.remove('flipped');
            document.getElementById('word-front').innerText = current.kanji;
            
            const img = document.getElementById('card-image');
            img.style.opacity = '0';
            img.src = `https://loremflickr.com/800/600/japan,zen?lock=${Math.floor(Math.random()*1000)}`;
            img.onload = () => img.style.opacity = '1';

            // 背面布局：增加搭配词显示
            let collContent = current.collocation ? `<div class="mb-3 p-3 bg-amber-50 rounded-xl text-xs border border-amber-100 text-amber-900 font-bold"><i class="fas fa-link mr-2"></i>${current.collocation}</div>` : '';
            
            let exHTML = '';
            current.examples.forEach(ex => {
                exHTML += `<div class="p-3 bg-slate-50 rounded-xl mb-2 flex justify-between items-center text-[13px] border border-slate-100">
                    <p class="flex-1 text-slate-700 leading-relaxed">${ex}</p>
                    <button class="text-indigo-500 ml-2 p-2 bg-white rounded-full shadow-sm" onclick="event.stopPropagation(); speak('${ex.replace(/^\d+\./,'')}')"><i class="fas fa-volume-up"></i></button>
                </div>`;
            });

            document.getElementById('back-content').innerHTML = `
                <div class="mb-4">
                    <div class="flex items-center gap-3">
                        <h2 class="text-3xl font-black text-slate-800">${current.kanji}</h2>
                        <button class="text-indigo-500 bg-slate-50 p-2 rounded-full" onclick="event.stopPropagation(); speak('${current.kanji}')"><i class="fas fa-volume-up"></i></button>
                    </div>
                    <p class="text-indigo-600 font-bold text-lg">${current.yomi}</p>
                </div>
                ${collContent}
                <div class="mb-4 p-4 bg-indigo-50 rounded-2xl text-sm font-medium text-indigo-900 border border-indigo-100">${current.meaning}</div>
                <div class="space-y-1">${exHTML}</div>
            `;
            updateUI();
            setTimeout(() => speak(current.kanji), 600);
        }

        function speak(t) {
            if (!t) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'ja-JP';
            // 强制使用发现的最佳声音
            if (bestVoice) u.voice = bestVoice;
            u.rate = 0.85; // 稍微调慢语速，增加清晰度
            u.pitch = 1.1; // 稍微调高音调，避免低沉模糊
            u.volume = 1.0;
            window.speechSynthesis.speak(u);
        }

        function speakCurrent(e) { e.stopPropagation(); speak(activeQueue[0].kanji); }
        function handleSRS(type, e) {
            e.stopPropagation();
            const c = activeQueue.shift();
            if (type === 'again') activeQueue.splice(1, 0, c);
            else if (type === 'hard') activeQueue.splice(Math.min(activeQueue.length, 5), 0, c);
            else if (type === 'good') activeQueue.push(c);
            saveProgress(); renderCard();
        }

        function flipToBack() { document.getElementById('card-inner').classList.add('flipped'); }
        function flipToFront() { document.getElementById('card-inner').classList.remove('flipped'); }
        function saveProgress() { localStorage.setItem('jflash_v5_2', JSON.stringify({ activeQueue, totalCount })); }
        function updateUI() {
            const prog = totalCount > 0 ? ((totalCount - activeQueue.length) / totalCount) * 100 : 0;
            document.getElementById('progress-bar').style.width = prog + '%';
            document.getElementById('progress-text').innerText = `PROGRESS: ${totalCount - activeQueue.length} / ${totalCount}`;
        }
    </script>
</body>
</html>
